<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>赞赏支持 · 燃气管家 — gasms.cn</title>
<meta name="description" content="赞赏支持燃气行业工具，让持续更新走得更远。微信/支付宝，任意金额。">
<style>
/* ===== Reset & Variables ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f172a;
  --blue:#2563eb;
  --blue-d:#1d4ed8;
  --blue-l:#eef2ff;
  --blue-v:#4f46e5;
  --green:#059669;
  --gray-50:#f8fafc;
  --gray-100:#f1f5f9;
  --gray-200:#e2e8f0;
  --gray-400:#94a3b8;
  --gray-500:#64748b;
  --gray-600:#475569;
  --gray-700:#334155;
  --gray-900:#0f172a;
  --card:#fff;
  --bg:#f8fafc;
  --radius:12px;
  --radius-lg:20px;
  --shadow:0 4px 24px rgba(0,0,0,.08);
  --shadow-lg:0 12px 48px rgba(0,0,0,.10);
  --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;
}
body{font-family:var(--font);color:var(--gray-900);background:linear-gradient(160deg,#f8fafc 0%,#eef2ff 100%);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
.wrap{max-width:520px;margin:0 auto;padding:32px 20px 40px;width:100%;flex:1}
a{text-decoration:none;color:inherit}

/* ===== Back Link ===== */
.back-link{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--gray-400);margin-bottom:24px;transition:color .2s}
.back-link:hover{color:var(--blue)}

/* ===== Header ===== */
.header{text-align:center;margin-bottom:28px}
.header .icon{width:56px;height:56px;background:linear-gradient(135deg,var(--blue),var(--blue-v));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px;box-shadow:0 4px 16px rgba(37,99,235,.25)}
.header h1{font-size:22px;font-weight:800;color:var(--gray-900);margin-bottom:4px}
.header p{font-size:13px;color:var(--gray-500);line-height:1.6}
.header .badge{display:inline-block;background:var(--blue-l);color:var(--blue);padding:4px 12px;border-radius:100px;font-size:12px;font-weight:600;margin-bottom:12px;border:1px solid rgba(37,99,235,.12)}

/* ===== Card ===== */
.card{background:var(--card);border-radius:var(--radius-lg);padding:28px 24px;box-shadow:var(--shadow);border:1px solid var(--gray-200);margin-bottom:16px}

/* ===== Tab Bar ===== */
.tab-bar{display:flex;gap:4px;background:var(--gray-100);border-radius:10px;padding:4px;margin-bottom:24px}
.tab-btn{flex:1;padding:10px;border:none;border-radius:8px;background:transparent;font-size:13px;font-weight:600;color:var(--gray-500);cursor:pointer;transition:all .2s;font-family:inherit}
.tab-btn.active{background:var(--card);color:var(--gray-900);box-shadow:0 1px 4px rgba(0,0,0,.08)}

/* ===== Section Title ===== */
.sec-title{font-size:13px;font-weight:600;color:var(--gray-400);margin-bottom:12px;display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.4px}

/* ===== Amount Grid ===== */
.amount-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.amount-btn{height:48px;border:1.5px solid var(--gray-200);border-radius:10px;background:var(--card);font-size:15px;font-weight:700;color:var(--gray-700);cursor:pointer;transition:all .2s;font-family:inherit}
.amount-btn:hover{border-color:var(--blue);background:var(--blue-l);color:var(--blue)}
.amount-btn.active{background:var(--gray-900);border-color:var(--gray-900);color:#fff;box-shadow:0 4px 12px rgba(15,23,42,.2)}
.amount-btn.custom{grid-column:1/-1;background:var(--gray-50);border-style:dashed;font-weight:600;color:var(--gray-400);font-size:13px}
.amount-btn.custom:hover{background:var(--blue-l);color:var(--blue);border-color:var(--blue)}
.amount-btn.custom.active{background:var(--gray-900);color:#fff;border-style:solid}

/* ===== Custom Input ===== */
.custom-row{display:none;gap:10px;margin-bottom:16px}
.custom-row.show{display:flex}
.custom-row input{flex:1;height:48px;border:1.5px solid var(--gray-200);border-radius:10px;padding:0 16px;font-size:16px;font-weight:600;font-family:inherit;outline:none;transition:border-color .2s;background:var(--gray-50)}
.custom-row input:focus{border-color:var(--blue)}
.custom-row input:invalid{border-color:#ef4444}
.custom-row .btn-cfm{height:48px;padding:0 24px;border:none;border-radius:10px;background:var(--gray-900);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s}
.custom-row .btn-cfm:hover{background:var(--blue);box-shadow:0 4px 12px rgba(37,99,235,.3)}

/* ===== Payment Methods ===== */
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.pay-btn{display:flex;align-items:center;justify-content:center;gap:10px;height:52px;border:1.5px solid var(--gray-200);border-radius:12px;background:var(--card);cursor:pointer;transition:all .2s;font-family:inherit;font-size:14px;font-weight:600;position:relative}
.pay-btn:hover{border-color:var(--blue);background:var(--blue-l)}
.pay-btn.active{border-color:var(--gray-900);background:var(--gray-50)}
.pay-btn .pay-check{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--gray-900);color:#fff;font-size:10px;display:none;align-items:center;justify-content:center}
.pay-btn.active .pay-check{display:flex}
.pay-btn svg{width:22px;height:22px;flex-shrink:0}

/* ===== QR Area ===== */
.qr-area{text-align:center;padding:8px 0 0}
.qr-box{display:inline-block;background:var(--gray-50);border-radius:var(--radius-lg);padding:20px;border:1px solid var(--gray-200);position:relative}
.qr-box img{width:200px;height:200px;display:block;border-radius:10px;object-fit:contain}
.qr-box .qr-mask{position:absolute;top:20px;left:20px;right:20px;bottom:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:24px;color:rgba(255,255,255,.9);background:rgba(0,0,0,.5);opacity:0;transition:opacity .3s;pointer-events:none}
.qr-box.loading .qr-mask{opacity:1}
.qr-amount{font-size:28px;font-weight:800;color:var(--gray-900);margin-top:14px;letter-spacing:-.5px}
.qr-amount .symbol{font-size:18px}
.qr-label{font-size:13px;color:var(--gray-500);margin-top:6px}
.qr-hint{font-size:12px;color:var(--gray-400);margin-top:4px}

/* ===== Note ===== */
.note{background:var(--gray-50);border-radius:var(--radius);padding:16px 18px;border:1px solid var(--gray-200)}
.note p{font-size:12px;color:var(--gray-400);line-height:1.7}
.note p strong{color:var(--gray-600)}

/* ===== Corp Tab ===== */
.corp-info{background:var(--gray-50);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.corp-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--gray-200);font-size:14px}
.corp-row:last-child{border-bottom:none}
.corp-row .label{color:var(--gray-400);font-weight:500}
.corp-row .value{color:var(--gray-700);font-weight:600}
.corp-mail{display:block;text-align:center;padding:14px;background:var(--gray-50);border-radius:var(--radius);color:var(--blue);font-size:14px;font-weight:600;transition:all .2s;border:1px solid transparent}
.corp-mail:hover{background:var(--blue-l);border-color:var(--blue)}

/* ===== Footer ===== */
.footer{text-align:center;padding:24px 0;font-size:12px;color:var(--gray-400)}
.footer a{color:var(--gray-500);transition:color .2s}
.footer a:hover{color:var(--blue)}

/* ===== Responsive ===== */
@media(max-width:480px){
  .wrap{padding:20px 16px 32px}
  .card{padding:24px 18px;border-radius:16px}
  .amount-grid{grid-template-columns:repeat(4,1fr);gap:8px}
  .amount-btn{height:44px;font-size:14px}
  .qr-box img{width:170px;height:170px}
  .qr-amount{font-size:24px}
}
</style>
</head>
<body>

<div class="wrap">
  <!-- Back -->
  <a href="../" class="back-link">← 返回首页</a>

  <!-- Header -->
  <div class="header">
    <div class="icon">❤️</div>
    <div class="badge">💝 同行交流 · 自愿赞赏</div>
    <h1>赞赏支持</h1>
    <p>觉得工具好用，请杯咖啡就是最大的鼓励 ☕<br>你的认可是我持续更新的动力</p>
  </div>

  <!-- Main Card -->
  <div class="card">
    <!-- Tab -->
    <div class="tab-bar" id="tabBar">
      <button class="tab-btn active" data-tab="personal">❤️ 个人赞赏</button>
      <button class="tab-btn" data-tab="corp">🏢 对公转账</button>
    </div>

    <!-- Personal Tab -->
    <div id="tabPersonal">
      <div class="sec-title">💰 选择金额</div>
      <div class="amount-grid" id="amountGrid">
        <button class="amount-btn" data-amount="10">¥10</button>
        <button class="amount-btn" data-amount="20">¥20</button>
        <button class="amount-btn active" data-amount="50">¥50</button>
        <button class="amount-btn" data-amount="100">¥100</button>
        <button class="amount-btn" data-amount="300">¥300</button>
        <button class="amount-btn" data-amount="500">¥500</button>
        <button class="amount-btn custom" data-amount="custom">✏️ 自定义金额</button>
      </div>

      <div class="custom-row" id="customRow">
        <input type="number" id="customAmount" placeholder="输入金额" min="1">
        <button class="btn-cfm" id="customConfirm">确定</button>
      </div>

      <div class="sec-title">📱 支付方式</div>
      <div class="pay-grid" id="payGrid">
        <!-- Alipay -->
        <button class="pay-btn" data-pay="alipay">
          <span class="pay-check">✓</span>
          <svg viewBox="0 0 24 24" fill="none">
            <rect x="2" y="4" width="20" height="16" rx="3" fill="#1677FF"/>
            <path d="M7.5 11.5a3 3 0 116 0 3 3 0 01-6 0z" fill="#fff" opacity=".9"/>
            <path d="M5 16l3-2M19 16l-3-2" stroke="#fff" stroke-width="1.2" opacity=".6"/>
          </svg>
          支付宝
        </button>
        <!-- WeChat -->
        <button class="pay-btn active" data-pay="wechat">
          <span class="pay-check">✓</span>
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M8.5 3C4.36 3 1 5.91 1 9.5c0 2.03 1.08 3.85 2.78 5.06L3.2 16.7l2.74-1.2c.82.22 1.68.34 2.56.34.36 0 .72-.02 1.08-.06-.17-.76-.26-1.56-.26-2.38 0-3.87 3.36-7 7.5-7l.51.03C16.14 4.38 12.91 3 8.5 3z" fill="#07C160"/>
            <path d="M17.5 11C13.91 11 11 13.58 11 16.75S13.91 22.5 17.5 22.5c.48 0 .95-.05 1.39-.14l2.56 1.14-.68-2.01C21.43 20.64 22 19.59 22 18.38 22 16.36 20.24 14.83 18 14.24V14c0-1.66-1.12-3-2.5-3z" fill="#07C160"/>
            <circle cx="14.5" cy="17.5" r=".8" fill="#fff"/>
            <circle cx="18.5" cy="17.5" r=".8" fill="#fff"/>
          </svg>
          微信支付
        </button>
      </div>

      <!-- QR Code -->
      <div class="qr-area">
        <div class="qr-box" id="qrBox">
          <img id="qrImage" src="../wechat-qr.jpg" alt="收款码">
          <div class="qr-mask" id="qrMask">⟳</div>
        </div>
        <div class="qr-amount"><span class="symbol">¥</span><span id="qrAmount">50</span></div>
        <div class="qr-label" id="qrLabel">打开微信扫一扫 · 输入金额完成赞赏</div>
        <div class="qr-hint">金额可自由调整 · 赞赏是自愿的 🙏</div>
      </div>
    </div>

    <!-- Corp Tab -->
    <div id="tabCorp" style="display:none">
      <div class="sec-title">🏦 对公转账信息</div>
      <div class="corp-info">
        <div class="corp-row"><span class="label">单位名称</span><span class="value">（请联系获取）</span></div>
        <div class="corp-row"><span class="label">开户行</span><span class="value">—</span></div>
        <div class="corp-row"><span class="label">账号</span><span class="value">—</span></div>
      </div>
      <a href="mailto:381068859@qq.com?subject=对公转账咨询" class="corp-mail">📧 邮件咨询对公事宜</a>
    </div>
  </div>

  <!-- Note -->
  <div class="note">
    <p><strong>💡 说明</strong><br>
    赞赏金额仅用于支持工具持续更新。所有工具功能完全免费，赞赏与否不影响任何使用。<br>
    如有问题可到工具设置页反馈，或邮件联系 <strong>381068859@qq.com</strong></p>
  </div>

  <div class="footer">
    <a href="../">← 返回 燃气管家</a> · www.gasms.cn
  </div>
</div>

<!-- Script -->
<script>
(function() {
  let selectedAmount = 50;
  let selectedPay = 'wechat';
  let isCustom = false;

  const $ = s => document.querySelector(s);
  const $$ = s => document.querySelectorAll(s);

  const amountBtns = $$('.amount-btn:not(.custom)');
  const customBtn = $('.amount-btn.custom');
  const customRow = $('#customRow');
  const customInput = $('#customAmount');
  const customConfirm = $('#customConfirm');
  const payBtns = $$('.pay-btn');
  const qrImage = $('#qrImage');
  const qrAmount = $('#qrAmount');
  const qrLabel = $('#qrLabel');
  const qrBox = $('#qrBox');
  const tabBtns = $$('.tab-btn');
  const tabPersonal = $('#tabPersonal');
  const tabCorp = $('#tabCorp');

  // Amount
  amountBtns.forEach(btn => {
    btn.addEventListener('click', function() {
      amountBtns.forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      customBtn.classList.remove('active');
      customRow.classList.remove('show');
      isCustom = false;
      selectedAmount = parseInt(this.dataset.amount);
      updateQR();
    });
  });

  customBtn.addEventListener('click', function() {
    amountBtns.forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    customRow.classList.add('show');
    isCustom = true;
    customInput.focus();
  });

  customInput.addEventListener('keydown', e => { if (e.key === 'Enter') confirmCustom(); });
  customConfirm.addEventListener('click', confirmCustom);

  function confirmCustom() {
    const val = parseInt(customInput.value);
    if (!val || val < 1) {
      customInput.style.borderColor = '#ef4444';
      customInput.placeholder = '请输入有效金额';
      setTimeout(() => { customInput.style.borderColor = ''; }, 800);
      return;
    }
    customInput.style.borderColor = '';
    selectedAmount = val;
    updateQR();
  }

  // Payment method
  payBtns.forEach(btn => {
    btn.addEventListener('click', function() {
      payBtns.forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      selectedPay = this.dataset.pay;
      updateQR();
    });
  });

  // Tabs
  tabBtns.forEach(btn => {
    btn.addEventListener('click', function() {
      tabBtns.forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      if (this.dataset.tab === 'personal') {
        tabPersonal.style.display = '';
        tabCorp.style.display = 'none';
      } else {
        tabPersonal.style.display = 'none';
        tabCorp.style.display = '';
      }
    });
  });

  // Update QR
  function updateQR() {
    const isAli = selectedPay === 'alipay';
    qrImage.src = isAli ? '../alipay-qr.jpg' : '../wechat-qr.jpg';
    qrImage.alt = isAli ? '支付宝收款码' : '微信收款码';
    qrImage.onload = () => qrBox.classList.remove('loading');
    qrBox.classList.add('loading');
    const amt = isCustom ? (customInput.value || selectedAmount) : selectedAmount;
    qrAmount.textContent = amt;
    qrLabel.textContent = isAli
      ? '打开支付宝扫一扫 · 输入金额完成赞赏'
      : '打开微信扫一扫 · 输入金额完成赞赏';
  }

  // Init
  updateQR();
})();
</script>
</body>
</html>
