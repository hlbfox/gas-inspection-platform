<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>赞赏支持 - 燃气安全数字化平台</title>
<meta name="description" content="赞赏支持燃气行业工具，让持续更新走得更远">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f6f8;--card:#fff;--text:#1a1a2e;--txt2:#6b7280;--blue:#2563eb;--blue-d:#1d4ed8;--blue-l:#eef2ff;--green:#059669;--green-l:#ecfdf5;--orange:#d97706;--orange-l:#fffbeb;--border:#e5e7eb;--shadow:0 8px 32px rgba(0,0,0,.08);--radius:16px}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
.wrap{max-width:480px;margin:0 auto;padding:40px 20px;width:100%;flex:1}
/* Header */
.header{text-align:center;margin-bottom:32px}
.header .icon{font-size:48px;margin-bottom:12px}
.header h1{font-size:24px;font-weight:700;margin-bottom:6px}
.header p{font-size:14px;color:var(--txt2);line-height:1.6}
.header .badge{display:inline-block;background:var(--blue-l);color:var(--blue);padding:4px 12px;border-radius:100px;font-size:12px;font-weight:500;margin-bottom:16px}
/* Card */
.card{background:var(--card);border-radius:var(--radius);padding:32px 28px;box-shadow:var(--shadow);margin-bottom:16px}
/* Amount */
.section-title{font-size:14px;font-weight:600;color:var(--txt2);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.amount-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.amount-btn{height:48px;border:1.5px solid var(--border);border-radius:12px;background:var(--card);font-size:15px;font-weight:600;color:var(--text);cursor:pointer;transition:all .15s;font-family:inherit}
.amount-btn:hover{border-color:var(--blue);background:var(--blue-l)}
.amount-btn.active{border-color:var(--blue);background:var(--blue);color:#fff}
.amount-btn.custom{grid-column:1/-1;background:var(--bg);font-weight:500;font-size:14px;color:var(--txt2);border-style:dashed}
.amount-btn.custom:hover{border-color:var(--blue);color:var(--blue)}
.amount-custom-input{display:none;margin-bottom:12px}
.amount-custom-input.show{display:flex;gap:10px}
.amount-custom-input input{flex:1;height:48px;border:1.5px solid var(--border);border-radius:12px;padding:0 16px;font-size:16px;font-weight:600;font-family:inherit;outline:none;transition:border-color .15s}
.amount-custom-input input:focus{border-color:var(--blue)}
.amount-custom-input input::-webkit-inner-spin-button{-webkit-appearance:none}
.amount-custom-input .btn-confirm{height:48px;padding:0 20px;border:none;border-radius:12px;background:var(--blue);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
/* Payment methods */
.pay-methods{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.pay-btn{display:flex;align-items:center;justify-content:center;gap:8px;height:52px;border:1.5px solid var(--border);border-radius:12px;background:var(--card);cursor:pointer;transition:all .15s;font-family:inherit;font-size:14px;font-weight:500}
.pay-btn:hover{border-color:var(--blue)}
.pay-btn.active{border-color:var(--blue);background:var(--blue-l)}
.pay-btn .pay-icon{font-size:20px}
.pay-btn .pay-name{color:var(--text)}
.pay-btn .pay-check{display:none;width:18px;height:18px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;align-items:center;justify-content:center}
.pay-btn.active .pay-check{display:inline-flex}
/* QR Code */
.qr-area{text-align:center;padding:24px 0 8px}
.qr-area .qr-box{display:inline-block;background:#fff;border-radius:16px;padding:16px;box-shadow:0 4px 20px rgba(0,0,0,.06);border:1px solid var(--border)}
.qr-area .qr-box img{width:200px;height:200px;display:block;border-radius:8px;object-fit:contain}
.qr-area .qr-label{font-size:13px;color:var(--txt2);margin-top:10px}
.qr-area .qr-amount{font-size:20px;font-weight:700;color:var(--text);margin-top:8px}
.qr-area .qr-hint{font-size:12px;color:#9ca3af;margin-top:6px;line-height:1.5}
/* Note */
.note{background:#f9fafb;border-radius:12px;padding:14px 16px;margin-top:4px}
.note p{font-size:13px;color:var(--txt2);line-height:1.6}
.note p strong{color:var(--text)}
/* Footer */
.footer{text-align:center;padding:24px 0;font-size:12px;color:#9ca3af}
.footer a{color:var(--txt2);text-decoration:none}
.footer a:hover{color:var(--blue)}
/* Tab bar */
.tab-bar{display:flex;gap:4px;background:#f3f4f6;border-radius:10px;padding:4px;margin-bottom:20px}
.tab-btn{flex:1;padding:10px;border:none;border-radius:8px;background:transparent;font-size:13px;font-weight:500;color:var(--txt2);cursor:pointer;transition:all .15s;font-family:inherit}
.tab-btn.active{background:#fff;color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
/* Responsive */
@media(max-width:480px){.wrap{padding:24px 16px}.card{padding:24px 20px}.amount-grid{grid-template-columns:repeat(4,1fr);gap:8px}.amount-btn{height:44px;font-size:14px}.qr-area .qr-box img{width:180px;height:180px}}
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div class="badge">💝 同行交流 · 赞赏支持</div>
    <div class="icon">🔥</div>
    <h1>赞赏支持</h1>
    <p>这些工具来自一线监管从业者，用 AI 自己做的<br>觉得好用，请杯咖啡就是最大的鼓励 ☕</p>
  </div>

  <div class="card">
    <!-- Tab: 赞赏 / 对公 -->
    <div class="tab-bar" id="tabBar">
      <button class="tab-btn active" data-tab="personal">❤️ 个人赞赏</button>
      <button class="tab-btn" data-tab="corp">🏢 对公转账</button>
    </div>

    <!-- Personal donation tab -->
    <div id="tabPersonal" class="tab-content">
      <div class="section-title">💰 选择金额</div>
      <div class="amount-grid" id="amountGrid">
        <button class="amount-btn" data-amount="10">¥10</button>
        <button class="amount-btn" data-amount="20">¥20</button>
        <button class="amount-btn active" data-amount="50">¥50</button>
        <button class="amount-btn" data-amount="100">¥100</button>
        <button class="amount-btn" data-amount="300">¥300</button>
        <button class="amount-btn" data-amount="500">¥500</button>
        <button class="amount-btn custom" data-amount="custom">✏️ 自定义金额</button>
      </div>

      <div class="amount-custom-input" id="customInput">
        <input type="number" id="customAmount" placeholder="输入金额（元）" min="1">
        <button class="btn-confirm" id="customConfirm">确定</button>
      </div>

      <div class="section-title">📱 支付方式</div>
      <div class="pay-methods" id="payMethods">
        <button class="pay-btn" data-pay="alipay">
          <span class="pay-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2z" fill="#1677FF"/><path d="M8.4 13.2c-.6-.3-1.2-.6-1.8-1.2-.6-.6-.9-1.3-.9-2 0-.7.3-1.4.9-2 .6-.6 1.3-.9 2-.9s1.4.3 2 .9c.6.6.9 1.3.9 2 0 .7-.3 1.4-.9 2-.6.6-1.3.9-2 .9v2.2c2 0 3.4-.8 4.3-2.2.9-1.4 1.3-3.2 1.3-5.4H7.5v-1.5h4V7.5H10V6h4v1.5h1.5v1.5H14v4.5c0 2.8-1.8 4.5-4.5 4.5v-2.2c.6-.1 1.2-.3 1.5-.5.3-.2.6-.4.8-.6l-.1.1c-.5.4-1.1.6-1.7.6-.5 0-1-.2-1.4-.5-.4-.3-.7-.8-.9-1.3l1.7-.6c.1.3.3.6.5.8.2.2.5.3.8.4" fill="#fff"/></svg></span>
          <span class="pay-name">支付宝</span>
          <span class="pay-check">✓</span>
        </button>
        <button class="pay-btn active" data-pay="wechat">
          <span class="pay-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M8.5 1C4.36 1 1 3.91 1 7.5c0 2.03 1.08 3.85 2.78 5.06L3.2 14.7l2.74-1.2c.82.22 1.68.34 2.56.34.36 0 .72-.02 1.08-.06-.17-.76-.26-1.56-.26-2.38 0-3.87 3.36-7 7.5-7l.51.03C16.14 2.38 12.91 1 8.5 1z" fill="#07C160"/><path d="M17.5 9C13.91 9 11 11.58 11 14.75S13.91 20.5 17.5 20.5c.48 0 .95-.05 1.39-.14l2.56 1.14-.68-2.01C21.43 18.64 22 17.59 22 16.38 22 14.36 20.24 12.83 18 12.24V12c0-1.66-1.12-3-2.5-3z" fill="#07C160"/><circle cx="14.5" cy="15.5" r=".8" fill="#fff"/><circle cx="18.5" cy="15.5" r=".8" fill="#fff"/></svg></span>
          <span class="pay-name">微信支付</span>
          <span class="pay-check">✓</span>
        </button>
      </div>

      <!-- QR Code display -->
      <div class="qr-area" id="qrArea">
        <div class="qr-box">
          <img id="qrImage" src="../wechat-qr.jpg" alt="收款码">
        </div>
        <div class="qr-amount" id="qrAmount">¥50</div>
        <div class="qr-label" id="qrLabel">打开微信扫一扫 · 输入金额完成赞赏</div>
        <div class="qr-hint">赞赏是自愿的，金额可自由调整 🙏</div>
      </div>
    </div>

    <!-- Corporate tab -->
    <div id="tabCorp" class="tab-content" style="display:none">
      <div class="section-title">🏦 对公转账信息</div>
      <div style="background:var(--bg);border-radius:12px;padding:20px 16px;margin-bottom:16px">
        <div style="margin-bottom:12px">
          <div style="font-size:12px;color:var(--txt2);margin-bottom:2px">单位名称</div>
          <div style="font-size:15px;font-weight:600">（如有需要请邮件联系）</div>
        </div>
        <div style="margin-bottom:12px">
          <div style="font-size:12px;color:var(--txt2);margin-bottom:2px">开户行</div>
          <div style="font-size:15px;font-weight:600">—</div>
        </div>
        <div>
          <div style="font-size:12px;color:var(--txt2);margin-bottom:2px">账号</div>
          <div style="font-size:15px;font-weight:600">—</div>
        </div>
      </div>
      <a href="mailto:381068859@qq.com?subject=对公转账咨询" style="display:block;text-align:center;padding:12px;background:var(--bg);border-radius:12px;color:var(--blue);text-decoration:none;font-size:14px;font-weight:500">📧 邮件咨询对公事宜</a>
    </div>
  </div>

  <div class="note">
    <p><strong>💡 说明</strong><br>
    赞赏金额仅用于支持工具持续更新。<br>
    所有工具功能完全免费，赞赏与否不影响使用。<br>
    如有问题可到 <a href="../#feedback" style="color:var(--blue)">工具设置页</a> 反馈。</p>
  </div>

  <div class="footer">
    <a href="../">← 返回首页</a> · <strong>燃气安全数字化平台</strong> · www.gasms.cn
  </div>
</div>

<script>
(function() {
  // State
  let selectedAmount = 50;
  let selectedPay = 'wechat';
  let isCustom = false;

  // Elements
  const amountBtns = document.querySelectorAll('.amount-btn:not(.custom)');
  const customBtn = document.querySelector('.amount-btn.custom');
  const customInput = document.getElementById('customInput');
  const customAmount = document.getElementById('customAmount');
  const customConfirm = document.getElementById('customConfirm');
  const payBtns = document.querySelectorAll('.pay-btn');
  const qrImage = document.getElementById('qrImage');
  const qrAmount = document.getElementById('qrAmount');
  const qrLabel = document.getElementById('qrLabel');
  const tabBtns = document.querySelectorAll('.tab-btn');
  const tabPersonal = document.getElementById('tabPersonal');
  const tabCorp = document.getElementById('tabCorp');

  // Amount selection
  amountBtns.forEach(btn => {
    btn.addEventListener('click', function() {
      amountBtns.forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      customBtn.classList.remove('active');
      customInput.classList.remove('show');
      isCustom = false;
      selectedAmount = parseInt(this.dataset.amount);
      updateQR();
    });
  });

  customBtn.addEventListener('click', function() {
    amountBtns.forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    customInput.classList.add('show');
    isCustom = true;
    customAmount.focus();
  });

  customAmount.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') confirmCustomAmount();
  });

  customConfirm.addEventListener('click', confirmCustomAmount);

  function confirmCustomAmount() {
    const val = parseInt(customAmount.value);
    if (!val || val < 1) {
      customAmount.style.borderColor = '#ef4444';
      customAmount.placeholder = '请输入有效的金额';
      return;
    }
    customAmount.style.borderColor = '';
    selectedAmount = val;
    updateQR();
  }

  // Payment method selection
  payBtns.forEach(btn => {
    btn.addEventListener('click', function() {
      payBtns.forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      selectedPay = this.dataset.pay;
      updateQR();
    });
  });

  // Tab switching
  tabBtns.forEach(btn => {
    btn.addEventListener('click', function() {
      tabBtns.forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      const tab = this.dataset.tab;
      if (tab === 'personal') {
        tabPersonal.style.display = '';
        tabCorp.style.display = 'none';
      } else {
        tabPersonal.style.display = 'none';
        tabCorp.style.display = '';
      }
    });
  });

  // Update QR display
  function updateQR() {
    const isAlipay = selectedPay === 'alipay';
    qrImage.src = isAlipay ? '../alipay-qr.jpg' : '../wechat-qr.jpg';
    qrImage.alt = isAlipay ? '支付宝收款码' : '微信收款码';

    const amountText = isCustom ? customAmount.value || selectedAmount : selectedAmount;
    qrAmount.textContent = '¥' + amountText;

    qrLabel.textContent = isAlipay
      ? '打开支付宝扫一扫 · 输入金额完成赞赏'
      : '打开微信扫一扫 · 输入金额完成赞赏';
  }
})();
</script>
</body>
</html>
